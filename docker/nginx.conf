upstream goals_service {
    server goals-service:8002;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers (goals service also sets these, belt-and-suspenders)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # Max body size for action notes / goal descriptions
    client_max_body_size 1M;

    # Health (no rate limiting so load balancer probes always pass)
    location /health {
        proxy_pass http://goals_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # Internal routes — only accessible from within the Docker network
    location /internal/ {
        # In production: restrict by IP range of internal services
        # allow 10.0.0.0/8;
        # deny  all;
        proxy_pass http://goals_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }

    # Public API
    location /api/ {
        proxy_pass http://goals_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Block everything else
    location / {
        return 404;
    }
}
