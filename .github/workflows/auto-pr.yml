name: Auto PR to Main

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "perf/**"
      - "refactor/**"

jobs:
  auto-pr:
    name: Open PR → main
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "[${{ github.ref_name }}] Auto PR" \
            --body "## Automated PR

          Branch: \`${{ github.ref_name }}\`
          Commit: \`${{ github.sha }}\`

          ---
          *Auto-generated by the CI pipeline. Review and merge manually.*" \
            || echo "No PR opened — one may already exist for this branch, or there's nothing to merge into main."
