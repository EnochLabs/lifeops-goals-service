name: Auto PR to Develop

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "perf/**"
      - "refactor/**"

jobs:
  auto-pr:
    name: Open PR → develop
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          title: "[${{ github.ref_name }}] Auto PR"
          body: |
            ## Automated PR

            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`

            ---
            *Auto-generated by the CI pipeline. Review and merge manually.*
          draft: false
          delete-branch: false
